<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG - Banque et Assurance au plus proche de vous - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { border-color: #d10000; box-shadow: 0 0 0 3px rgba(209, 0, 0, 0.1); outline: none; }
        .btn-login { transition: background-color 0.2s, transform 0.1s; }
        .btn-login:hover { background-color: #a80000; }
        .btn-login:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-white min-h-screen">
    <div class="min-h-screen flex">
        <!-- Panneau image (gauche) -->
        <div class="hidden lg:block flex-1 relative bg-cover bg-center"
             style="background-image: url('https://images.unsplash.com/photo-1558752956-0830a7081d47?crop=entropy&cs=srgb&fm=jpg&q=85')">
            <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(209,0,0,0.1) 0%, rgba(0,0,0,0.35) 100%);">
                <div class="absolute bottom-0 left-0 p-12">
                    <h2 class="text-4xl font-bold text-white mb-2" style="font-family: 'Outfit', sans-serif;">BANQUE-SG</h2>
                    <p class="text-lg" style="color: rgba(255,255,255,0.8);">Banque et Assurance au plus proche de vous</p>
                </div>
            </div>
        </div>

        <!-- Panneau formulaire (droite) -->
        <div class="flex-1 flex items-center justify-center p-6 sm:p-8">
            <div class="w-full max-w-md animate-fade-in">
                <!-- Logo -->
                <div class="mb-10">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color: #d10000;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
                        </div>
                        <span class="text-2xl font-bold text-slate-900" style="font-family: 'Outfit', sans-serif;">SG-BANQUE</span>
                    </div>
                    <h1 class="text-3xl font-semibold text-slate-900 mb-2" style="font-family: 'Outfit', sans-serif;">Bienvenue</h1>
                    <p class="text-slate-500">Connectez-vous à votre espace client</p>
                </div>

                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 flex items-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Identifiant</label>
                        <input type="text" name="identifiant" class="input-field w-full border border-slate-200 rounded-lg px-4 py-3 text-sm bg-white" placeholder="Entrez votre identifiant" required>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Mot de passe</label>
                        <div class="relative">
                            <input type="password" name="password" id="password-input" class="input-field w-full border border-slate-200 rounded-lg px-4 py-3 pr-12 text-sm bg-white" placeholder="Entrez votre mot de passe" required>
                            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1">
                                <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login w-full text-white font-medium py-3 px-6 rounded-lg flex items-center justify-center gap-2" style="background-color: #d10000;">
                        Se connecter
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </form>

                <div class="mt-8 p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Compte Société Générale</p>
                    <p class="text-sm text-slate-700">Saisissez votre identifiant client <code class="bg-white px-2 py-0.5 rounded border border-slate-200 text-sm font-mono">confidentiel</code></p>
                    <p class="text-sm text-slate-700 mt-1">Votre mot de passe : <code class="bg-white px-2 py-0.5 rounded border border-slate-200 text-sm font-mono">confidentiel</code></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            var input = document.getElementById('password-input');
            var eyeOpen = document.getElementById('eye-open');
            var eyeClosed = document.getElementById('eye-closed');
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }
    </script>
</body>
</html>
